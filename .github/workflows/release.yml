name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=0.0.0-$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

  publish-cli:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bed-vibe/shared build

      - name: Build CLI
        run: pnpm --filter @bed-vibe/cli build

      - name: Set version
        run: |
          VERSION=${{ needs.resolve-version.outputs.version }}
          cd packages/cli
          npm version $VERSION --no-git-tag-version
          cd ../shared
          npm version $VERSION --no-git-tag-version

      - name: Publish shared
        run: |
          cd packages/shared
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        run: |
          VERSION=${{ needs.resolve-version.outputs.version }}
          cd packages/cli
          sed -i 's/"@bed-vibe\/shared": "workspace:\*"/"@bed-vibe\/shared": "'$VERSION'"/' package.json
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Push Server to Docker Hub
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bed-vibe:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bed-vibe:${{ needs.resolve-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
