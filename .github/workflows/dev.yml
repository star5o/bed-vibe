name: Dev Build

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'

permissions:
  contents: read
  packages: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      branch: ${{ steps.ver.outputs.branch }}
    steps:
      - name: Determine version
        id: ver
        run: |
          BRANCH=${GITHUB_REF_NAME//[^a-zA-Z0-9-]/-}
          VERSION="0.0.0-${BRANCH}-$(date -u +%y%m%d%H%M%S)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

  publish-cli:
    name: Publish CLI to npm (debug)
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bed-vibe/shared build

      - name: Build CLI
        run: pnpm --filter bed-vibe build

      - name: Deprecate previous dev versions
        run: |
          BRANCH=${{ needs.resolve-version.outputs.branch }}
          for pkg in @bed-vibe/shared bed-vibe @bed-vibe/client; do
            VERSIONS=$(npm view "$pkg" versions --json 2>/dev/null | jq -r '.[]?' | grep "^0\.0\.0-${BRANCH}-" || true)
            for v in $VERSIONS; do
              echo "Deprecating $pkg@$v"
              npm deprecate "$pkg@$v" "superseded by newer dev build" || true
            done
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set version
        run: |
          VERSION=${{ needs.resolve-version.outputs.version }}
          node -e "const f='packages/shared/package.json';const p=JSON.parse(require('fs').readFileSync(f));p.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
          node -e "const f='packages/cli/package.json';const p=JSON.parse(require('fs').readFileSync(f));p.version='$VERSION';p.dependencies['@bed-vibe/shared']='$VERSION';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"

      - name: Publish shared
        run: cd packages/shared && npm publish --access public --tag debug
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI (bed-vibe)
        run: cd packages/cli && npm publish --access public --tag debug
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish alias (@bed-vibe/client)
        run: |
          VERSION=${{ needs.resolve-version.outputs.version }}
          node -e "const f='packages/client-alias/package.json';const p=JSON.parse(require('fs').readFileSync(f));p.version='$VERSION';p.dependencies['bed-vibe']='$VERSION';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
          cd packages/client-alias && npm publish --access public --tag debug
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Push Server to Docker Hub (debug)
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Clean previous dev tags
        run: |
          BRANCH=${{ needs.resolve-version.outputs.branch }}
          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' | jq -r .token)
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/bed-vibe/tags?page_size=100" \
            -H "Authorization: Bearer $TOKEN" | jq -r ".results[].name" | grep "^0\.0\.0-${BRANCH}-" || true)
          for tag in $TAGS; do
            echo "Removing docker tag: $tag"
            curl -s -X DELETE "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/bed-vibe/tags/$tag" \
              -H "Authorization: Bearer $TOKEN" || true
          done

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bed-vibe:debug
            ${{ secrets.DOCKERHUB_USERNAME }}/bed-vibe:${{ needs.resolve-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
